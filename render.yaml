services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: uzloadstms-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uzloadstms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: ./uploads
    healthCheckPath: /health

  # ── Frontend Static Site ────────────────────────────────────────────────────
  - type: web
    name: uzloadstms
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: https://uzloadstms-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: uzloadstms-db
    databaseName: trucking_tms
    plan: free
