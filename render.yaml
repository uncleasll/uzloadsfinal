services:
  - type: web
    name: uzloadsfinal-api
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://uzloadsfinal-7c41.vercel.app,http://localhost:5173,http://localhost:3000
      - key: UPLOAD_DIR
        value: ./uploads
